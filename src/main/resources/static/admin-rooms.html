<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản Lý Phòng - Khách Sạn Luxury</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/startbootstrap-sb-admin-2@4.1.4/css/sb-admin-2.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body id="page-top">
    <!-- Wrapper -->
    <div id="wrapper">
      <!-- Sidebar -->
      <ul
        class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion"
        id="accordionSidebar"
      >
        <a
          class="sidebar-brand d-flex align-items-center justify-content-center"
          href="index.html"
        >
          <div class="sidebar-brand-icon rotate-n-15">
            <i class="fas fa-hotel"></i>
          </div>
          <div class="sidebar-brand-text mx-3">Hotel Admin</div>
        </a>
        <hr class="sidebar-divider my-0" />
        <li class="nav-item">
          <a class="nav-link" href="admin.html">
            <i class="fas fa-fw fa-tachometer-alt"></i>
            <span>Tổng Quan</span></a
          >
        </li>
        <li class="nav-item">
          <a class="nav-link" href="admin.html">
            <i class="fas fa-fw fa-calendar-alt"></i>
            <span>Danh Sách Đặt Phòng</span></a
          >
        </li>
        <li class="nav-item active">
          <a class="nav-link" href="admin-rooms.html">
            <i class="fas fa-fw fa-door-open"></i>
            <span>Quản Lý Phòng</span></a
          >
        </li>
      </ul>

      <!-- Content Wrapper -->
      <div id="content-wrapper" class="d-flex flex-column">
        <!-- Main Content -->
        <div id="content">
          <!-- Topbar -->
          <nav
            class="navbar navbar-expand navbar-light bg-white topbar mb-4 static-top shadow"
          >
            <button
              id="sidebarToggleTop"
              class="btn btn-link d-md-none rounded-circle mr-3"
            >
              <i class="fa fa-bars"></i>
            </button>
            <ul class="navbar-nav ml-auto">
              <li class="nav-item dropdown no-arrow">
                <a
                  class="nav-link dropdown-toggle"
                  href="#"
                  id="userDropdown"
                  role="button"
                  data-toggle="dropdown"
                >
                  <span class="mr-2 d-none d-lg-inline text-gray-600 small"
                    >Quản Trị Viên</span
                  >
                  <img
                    class="img-profile rounded-circle"
                    src="https://via.placeholder.com/60"
                  />
                </a>
              </li>
            </ul>
          </nav>

          <!-- Begin Page Content -->
          <div class="container-fluid">
            <!-- Page Heading -->
            <div
              class="d-sm-flex align-items-center justify-content-between mb-4"
            >
              <h1 class="h3 mb-0 text-gray-800">Quản Lý Phòng</h1>
              <button class="btn btn-primary" onclick="openRoomModal()">
                <i class="fas fa-plus"></i> Thêm Phòng Mới
              </button>
            </div>

            <!-- Rooms Table -->
            <div class="card shadow mb-4">
              <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">
                  Danh Sách Phòng
                </h6>
              </div>
              <div class="card-body">
                <div class="table-responsive">
                  <table
                    class="table table-bordered"
                    id="roomsTable"
                    width="100%"
                    cellspacing="0"
                  >
                    <thead>
                      <tr>
                        <th>ID</th>
                        <th>Số Phòng</th>
                        <th>Tầng</th>
                        <th>Loại Phòng</th>
                        <th>Giá Cơ Bản</th>
                        <th>Trạng Thái</th>
                        <th>Hành Động</th>
                      </tr>
                    </thead>
                    <tbody id="roomsTableBody">
                      <!-- Data will be populated here -->
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
          <!-- /.container-fluid -->
        </div>
        <!-- End of Main Content -->
      </div>
      <!-- End of Content Wrapper -->
    </div>
    <!-- End of Wrapper -->

    <!-- Room Modal -->
    <div
      class="modal fade"
      id="roomModal"
      tabindex="-1"
      aria-labelledby="roomModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="roomModalLabel">Thông Tin Phòng</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="roomId" />
            <div class="mb-3">
              <label for="roomNumber" class="form-label">Số Phòng</label>
              <input
                type="text"
                class="form-control"
                id="roomNumber"
                required
              />
            </div>
            <div class="mb-3">
              <label for="floor" class="form-label">Tầng</label>
              <input type="number" class="form-control" id="floor" required />
            </div>
            <div class="mb-3">
              <label for="roomTypeId" class="form-label">Loại Phòng</label>
              <select class="form-select" id="roomTypeId" required>
                <option value="">-- Đang tải... --</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="status" class="form-label">Trạng Thái</label>
              <select class="form-select" id="status">
                <option value="AVAILABLE">Sẵn Sàng</option>
                <option value="OCCUPIED">Đang Có Khách</option>
                <option value="RESERVED">Đã Đặt</option>
                <option value="OUT_OF_SERVICE">Đang Bảo Trì</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="housekeepingStatus" class="form-label">Vệ Sinh</label>
              <select class="form-select" id="housekeepingStatus">
                <option value="CLEAN">Sạch Sẽ</option>
                <option value="NEEDS_CLEANING">Cần Dọn</option>
                <option value="IN_PROGRESS">Đang Dọn</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Đóng
            </button>
            <button type="button" class="btn btn-primary" onclick="saveRoom()">
              Lưu
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Simple admin auth gate -->
    <script>
      (function() {
        const ADMIN_KEY = "hotel_admin_auth";
        const ADMIN_PASS = "admin123";
        if (sessionStorage.getItem(ADMIN_KEY) !== "ok") {
          const pwd = prompt("🔒 Khu vực quản trị viên\nVui lòng nhập mật khẩu:");
          if (pwd !== ADMIN_PASS) {
            alert("Mật khẩu không đúng. Chuyển hướng về trang chủ.");
            window.location.href = "index.html";
          } else {
            sessionStorage.setItem(ADMIN_KEY, "ok");
          }
        }
      })();
    </script>
    <script src="js/admin-rooms.js"></script>
  </body>
</html>
